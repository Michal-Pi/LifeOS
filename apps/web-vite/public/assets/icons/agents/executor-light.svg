<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="executor-light-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Gear/cog -->
  <circle cx="32" cy="32" r="10" stroke="url(#executor-light-grad)" stroke-width="2" fill="none"/>
  <circle cx="32" cy="32" r="4" stroke="url(#executor-light-grad)" stroke-width="2" fill="url(#executor-light-grad)" fill-opacity="0.3"/>
  <!-- Gear teeth -->
  <rect x="30" y="16" width="4" height="6" fill="url(#executor-light-grad)"/>
  <rect x="30" y="42" width="4" height="6" fill="url(#executor-light-grad)"/>
  <rect x="16" y="30" width="6" height="4" fill="url(#executor-light-grad)"/>
  <rect x="42" y="30" width="6" height="4" fill="url(#executor-light-grad)"/>
  <rect x="22" y="20" width="3" height="5" fill="url(#executor-light-grad)" transform="rotate(45 23.5 22.5)"/>
  <rect x="39" y="20" width="3" height="5" fill="url(#executor-light-grad)" transform="rotate(-45 40.5 22.5)"/>
  <rect x="22" y="39" width="3" height="5" fill="url(#executor-light-grad)" transform="rotate(-45 23.5 41.5)"/>
  <rect x="39" y="39" width="3" height="5" fill="url(#executor-light-grad)" transform="rotate(45 40.5 41.5)"/>
</svg>
