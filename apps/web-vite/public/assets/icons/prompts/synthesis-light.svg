<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="prompt-synthesis-light-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Multiple inputs converging -->
  <circle cx="18" cy="20" r="4" stroke="url(#prompt-synthesis-light-grad)" stroke-width="2" fill="url(#prompt-synthesis-light-grad)" fill-opacity="0.2"/>
  <circle cx="46" cy="20" r="4" stroke="url(#prompt-synthesis-light-grad)" stroke-width="2" fill="url(#prompt-synthesis-light-grad)" fill-opacity="0.2"/>
  <circle cx="18" cy="36" r="4" stroke="url(#prompt-synthesis-light-grad)" stroke-width="2" fill="url(#prompt-synthesis-light-grad)" fill-opacity="0.2"/>
  <circle cx="46" cy="36" r="4" stroke="url(#prompt-synthesis-light-grad)" stroke-width="2" fill="url(#prompt-synthesis-light-grad)" fill-opacity="0.2"/>
  <!-- Central synthesis point -->
  <circle cx="32" cy="28" r="6" stroke="url(#prompt-synthesis-light-grad)" stroke-width="2.5" fill="url(#prompt-synthesis-light-grad)" fill-opacity="0.3"/>
  <!-- Convergence lines -->
  <line x1="21" y1="22" x2="27" y2="26" stroke="url(#prompt-synthesis-light-grad)" stroke-width="2" opacity="0.6"/>
  <line x1="43" y1="22" x2="37" y2="26" stroke="url(#prompt-synthesis-light-grad)" stroke-width="2" opacity="0.6"/>
  <line x1="21" y1="34" x2="27" y2="30" stroke="url(#prompt-synthesis-light-grad)" stroke-width="2" opacity="0.6"/>
  <line x1="43" y1="34" x2="37" y2="30" stroke="url(#prompt-synthesis-light-grad)" stroke-width="2" opacity="0.6"/>
  <!-- Output arrow -->
  <line x1="32" y1="34" x2="32" y2="44" stroke="url(#prompt-synthesis-light-grad)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="32,44 30,41 34,41" fill="url(#prompt-synthesis-light-grad)"/>
</svg>
