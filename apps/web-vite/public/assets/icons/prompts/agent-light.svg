<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="prompt-agent-light-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Robot head -->
  <rect x="20" y="22" width="24" height="20" rx="2" stroke="url(#prompt-agent-light-grad)" stroke-width="2" fill="url(#prompt-agent-light-grad)" fill-opacity="0.1"/>
  <!-- Eyes -->
  <circle cx="28" cy="30" r="3" stroke="url(#prompt-agent-light-grad)" stroke-width="1.5" fill="url(#prompt-agent-light-grad)" fill-opacity="0.4"/>
  <circle cx="36" cy="30" r="3" stroke="url(#prompt-agent-light-grad)" stroke-width="1.5" fill="url(#prompt-agent-light-grad)" fill-opacity="0.4"/>
  <!-- Antenna -->
  <line x1="32" y1="22" x2="32" y2="16" stroke="url(#prompt-agent-light-grad)" stroke-width="2"/>
  <circle cx="32" cy="16" r="2" fill="url(#prompt-agent-light-grad)"/>
  <!-- Mouth/interface -->
  <line x1="26" y1="37" x2="30" y2="37" stroke="url(#prompt-agent-light-grad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="37" x2="38" y2="37" stroke="url(#prompt-agent-light-grad)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
