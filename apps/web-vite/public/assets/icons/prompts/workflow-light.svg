  <polygon points="29,30 27,29 28,31" fill="url(#prompt-workflow-light-grad)"/>
  <polygon points="41,26 42,24 40,25" fill="url(#prompt-workflow-light-grad)"/>
  <polygon points="32,40 31,42 33,42" fill="url(#prompt-workflow-light-grad)"/>
