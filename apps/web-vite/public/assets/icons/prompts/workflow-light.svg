<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="prompt-workflow-light-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Flow nodes -->
  <circle cx="20" cy="24" r="4" stroke="url(#prompt-workflow-light-grad)" stroke-width="2" fill="url(#prompt-workflow-light-grad)" fill-opacity="0.3"/>
  <circle cx="32" cy="32" r="5" stroke="url(#prompt-workflow-light-grad)" stroke-width="2" fill="url(#prompt-workflow-light-grad)" fill-opacity="0.3"/>
  <circle cx="44" cy="24" r="4" stroke="url(#prompt-workflow-light-grad)" stroke-width="2" fill="url(#prompt-workflow-light-grad)" fill-opacity="0.3"/>
  <circle cx="32" cy="44" r="4" stroke="url(#prompt-workflow-light-grad)" stroke-width="2" fill="url(#prompt-workflow-light-grad)" fill-opacity="0.3"/>
  <!-- Connecting lines -->
  <line x1="23" y1="26" x2="29" y2="30" stroke="url(#prompt-workflow-light-grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="30" x2="41" y2="26" stroke="url(#prompt-workflow-light-grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="37" x2="32" y2="40" stroke="url(#prompt-workflow-light-grad)" stroke-width="2" stroke-linecap="round"/>
